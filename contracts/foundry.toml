[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"

optimizer = true
optimizer_runs = 200

# EVM version compatible with Arbitrum (supports cancun opcodes since ArbOS 31)
evm_version = "cancun"

# Remappings
remappings = [
    "forge-std/=lib/forge-std/src/",
]

# Fork testing
[rpc_endpoints]
arbitrum = "${ARBITRUM_RPC_URL}"
mantle = "https://mantle-mainnet.g.alchemy.com/v2/YOUR_ALCHEMY_KEY"

# Formatter
[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"
