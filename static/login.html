<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Multi-Chain Liquidator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1117'/><circle cx='12' cy='16' r='7' fill='none' stroke='%233fb950' stroke-width='2.5'/><circle cx='20' cy='16' r='7' fill='none' stroke='%2358a6ff' stroke-width='2.5'/></svg>">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#c9d1d9; font-family:'SF Mono','Fira Code',monospace; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.login-box { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:40px; width:380px; text-align:center; }
.login-box h1 { font-size:18px; color:#f0f6fc; margin-bottom:8px; }
.login-box p { font-size:12px; color:#8b949e; margin-bottom:24px; }
.input-group { margin-bottom:16px; }
.input-group input { width:100%; padding:10px 14px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#f0f6fc; font-family:inherit; font-size:13px; outline:none; }
.input-group input:focus { border-color:#58a6ff; }
.btn { width:100%; padding:10px; background:#238636; border:none; border-radius:6px; color:#fff; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; }
.btn:hover { background:#2ea043; }
.error { color:#f85149; font-size:11px; margin-top:8px; display:none; }
</style>
</head>
<body>
<div class="login-box">
  <h1>Multi-Chain Liquidator</h1>
  <p>Enter access token to continue</p>
  <form id="login-form">
    <div class="input-group">
      <input type="password" id="token-input" placeholder="Access token" autocomplete="off" autofocus>
    </div>
    <button type="submit" class="btn">Sign In</button>
    <div class="error" id="error-msg">Invalid token</div>
  </form>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var token = document.getElementById('token-input').value.trim();
  if (!token) return;
  fetch('/api/status?token=' + encodeURIComponent(token)).then(function(r) {
    if (r.ok) {
      window.location.href = '/?token=' + encodeURIComponent(token);
    } else {
      document.getElementById('error-msg').style.display = 'block';
    }
  }).catch(function() {
    document.getElementById('error-msg').style.display = 'block';
  });
});
</script>
</body>
</html>
